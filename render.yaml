services:
  - type: web
    name: mera-app
    runtime: node
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install && npx prisma generate
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: ./uploads
      - key: LLM_PROVIDER
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
