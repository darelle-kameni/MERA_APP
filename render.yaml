services:
  - type: web
    name: mera-app
    runtime: node
    plan: free
    buildCommand: >
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install &&
      npx prisma generate &&
      npx prisma db push --skip-generate
    startCommand: cd backend && node prisma/seed.js && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: mera-db
          property: connectionString
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGIN
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: ./uploads
      - key: LLM_PROVIDER
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""

databases:
  - name: mera-db
    plan: free
    databaseName: mera
    ipAllowList: []
